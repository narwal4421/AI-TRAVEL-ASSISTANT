<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AI Travel Assistant</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="auth-wrapper">
    <form id="loginForm" class="card auth-card">
      <h2>Welcome Back</h2>
      <p>Log in to continue planning your journey.</p>
      <label for="loginUsername">Username</label>
      <input id="loginUsername" type="text" required />

      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" required />

      <button class="btn" type="submit">Login</button>
      <p class="form-link">No account? <a href="signup.html">Create one</a></p>
      <p id="loginMessage" class="message"></p>
    </form>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
